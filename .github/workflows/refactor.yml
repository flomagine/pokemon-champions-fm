name: Build SE modular source

on:
  push:
    branches: [main]
    paths:
      - 'tools/refactor.py.gz.b64'
      - '.github/workflows/refactor.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refactor:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore refactor generator
        run: base64 --decode tools/refactor.py.gz.b64 | gzip --decompress > /tmp/refactor.py

      - name: Generate modular application
        run: python /tmp/refactor.py

      - name: Run regression tests
        run: npm test

      - name: Commit generated source
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No generated changes.'
            exit 0
          fi
          git commit -m 'Refactor simulator into SE modules'
          git push
