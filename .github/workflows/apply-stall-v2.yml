name: Apply sustain-aware engine

on:
  push:
    branches: [main]
    paths: ['.github/workflows/apply-stall-v2.yml']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Switch UI to sustain-aware engines
        run: |
          sed -i "s#../core/matchup-engine.js#../core/matchup-engine-v2.js#" src/ui/simulator-app.js
          sed -i "s#../core/selection-engine.js#../core/selection-engine-v2.js#" src/ui/simulator-app.js
          sed -i "s#../core/defense-engine.js#../core/defense-engine-v2.js#" src/ui/formatters.js
      - name: Run regression tests
        run: npm test
      - name: Commit integrated engine
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/ui/simulator-app.js src/ui/formatters.js
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'Integrate sustain-aware matchup and selection engines'
          git push
