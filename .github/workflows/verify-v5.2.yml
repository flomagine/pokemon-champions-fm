name: Verify v5.2 team analysis

on:
  push:
    branches: [main]
    paths: ['.github/workflows/verify-v5.2.yml']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Syntax check
        run: find src -name '*.js' -print0 | xargs -0 -n1 node --check
      - name: Regression tests
        run: npm test
      - name: Record verification
        run: |
          mkdir -p reports
          cat > reports/v5.2-verification.md <<'EOF'
          # v5.2 Verification

          - JavaScript syntax check: passed
          - Domain and team-analysis regression tests: passed
          - Catalog and mega integrity tests: passed
          - Bellibolt recovery-wall tests: passed
          - Stall archetype and role-graph tests: passed
          - Team-aware 60-plan ranking test: passed
          EOF
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add reports/v5.2-verification.md
          git commit -m 'Record v5.2 team analysis verification'
          git push
