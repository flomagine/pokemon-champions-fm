name: Verify refined status analysis

on:
  push:
    branches: [main]
    paths: ['.github/workflows/refine-status-analysis.yml']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check syntax and tests
        run: |
          find src -name '*.js' -print0 | xargs -0 -n1 node --check
          npm test
      - name: Record verification
        run: |
          cat > reports/v5.2.1-verification.md <<'EOF'
          # v5.2.1 Verification

          - JavaScript syntax check: passed
          - All domain, sustain and team-analysis tests: passed
          - Role centrality propagation: passed
          - Toxic with type-control interaction: passed
          - Yawn pivot partial mitigation: passed
          - Burn against physical-only groups: passed
          EOF
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add reports/v5.2.1-verification.md
          git commit -m 'Record v5.2.1 status analysis verification'
          git push
